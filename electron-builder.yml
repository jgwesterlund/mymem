appId: com.westerlund.mymem
productName: myMem
directories:
  buildResources: resources
  output: release
files:
  - out/**
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  # sqlite-vec ships its loadable vec0.dylib in platform packages (sqlite-vec-darwin-arm64
  # etc.) — dylibs cannot be dlopen'd from inside the asar archive.
  - "**/node_modules/sqlite-vec*/**"
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  # Unsigned during development; signing + notarization wired up in M9.
  identity: null
npmRebuild: true
