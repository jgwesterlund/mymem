appId: com.westerlund.mymem
productName: myMem
directories:
  buildResources: resources
  output: release
files:
  - out/**
# buildResources is build-time only (icon.icns etc.) — it is NOT packaged. The
# menu bar template images must ship inside the app, so they are copied to
# <app>/Contents/Resources/tray (= process.resourcesPath/tray at runtime).
extraResources:
  - from: resources/tray
    to: tray
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  # sqlite-vec ships its loadable vec0.dylib in platform packages (sqlite-vec-darwin-arm64
  # etc.) — dylibs cannot be dlopen'd from inside the asar archive.
  - "**/node_modules/sqlite-vec*/**"
  # Embeddings worker (M5): onnxruntime-node carries the native ORT binding/dylibs.
  # @huggingface/transformers itself is pure JS (verified: dist/ has only js/mjs/cjs),
  # but its node bundle eagerly imports sharp, whose native binding lives in @img/*.
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
mac:
  category: public.app-category.productivity
  target:
    - dmg
    - zip
  # ── Signing / notarization (M9) ─────────────────────────────────────────────
  # Unsigned local builds for now: identity stays null until John has an Apple
  # Developer ID Application certificate in his keychain. To ship signed builds:
  #   1. delete the `identity: null` line (electron-builder auto-discovers the
  #      "Developer ID Application: …" identity from the keychain), and
  #   2. flip `notarize: true`, with credentials in the environment:
  #        export APPLE_ID="john.westerlund@cygnisec.com"
  #        export APPLE_APP_SPECIFIC_PASSWORD="xxxx-xxxx-xxxx-xxxx"   # appleid.apple.com → app-specific password
  #        export APPLE_TEAM_ID="XXXXXXXXXX"
  #      (electron-builder picks these up and staples the ticket automatically).
  # hardenedRuntime is required for notarization and harmless unsigned.
  identity: null
  notarize: false
  hardenedRuntime: true
npmRebuild: true
